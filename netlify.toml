[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/coleccion"
  to = "/coleccion.html"
  status = 200

[[redirects]]
  from = "/collection"
  to = "/coleccion.html"
  status = 200

[functions]
  node_bundler = "esbuild"
